name: RistoAgent Monitoring

on:
  schedule:
    - cron: '*/30 * * * *'
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - health-check
          - daily-report

jobs:
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    steps:
      - name: Check site (first attempt)
        id: check1
        run: |
          START=$(date +%s%3N)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ secrets.APP_URL }}/api/health" 2>/dev/null || echo "000")
          END=$(date +%s%3N)
          DURATION=$((END - START))
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=${DURATION}ms" >> $GITHUB_OUTPUT
          echo "Site check: $STATUS in ${DURATION}ms"

      - name: Wait 60s and retry if failed
        if: steps.check1.outputs.status != '200'
        run: sleep 60

      - name: Check site (second attempt)
        id: check2
        if: steps.check1.outputs.status != '200'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ secrets.APP_URL }}/api/health" 2>/dev/null || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Second check: $STATUS"

      - name: Send DOWN alert
        if: steps.check1.outputs.status != '200' && steps.check2.outputs.status != '200'
        env:
          BOT_TOKEN: ${{ secrets.MONITOR_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.OWNER_CHAT_ID }}
          STATUS: ${{ steps.check1.outputs.status }}
        run: |
          TIME=$(date -u '+%H:%M - %d %b %Y')
          python3 -c "
          import urllib.request, json, os
          token = os.environ['BOT_TOKEN']
          chat_id = os.environ['CHAT_ID']
          status = os.environ['STATUS']
          time = os.environ['TIME']
          text = (
            '🚨 ALERT RISTOAGENT\n'
            '━━━━━━━━━━━━━━━━━━━\n'
            '❌ Sito non raggiungibile\n'
            f'⏰ {time}\n'
            f'Status: {status}\n'
            '🔁 2 check consecutivi falliti\n'
            '━━━━━━━━━━━━━━━━━━━\n'
            '⚡ Controlla Vercel dashboard'
          )
          data = json.dumps({'chat_id': chat_id, 'text': text}).encode()
          req = urllib.request.Request(
            f'https://api.telegram.org/bot{token}/sendMessage',
            data=data, headers={'Content-Type': 'application/json'}
          )
          urllib.request.urlopen(req)
          print('Alert sent')
          "
        env:
          TIME: ${{ steps.check1.outputs.duration }}
          BOT_TOKEN: ${{ secrets.MONITOR_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.OWNER_CHAT_ID }}
          STATUS: ${{ steps.check1.outputs.status }}

      - name: All good
        if: steps.check1.outputs.status == '200'
        run: echo "✅ Site online - ${{ steps.check1.outputs.duration }}"

  daily-report:
    name: Daily Report
    runs-on: ubuntu-latest
    steps:
      - name: Check uptime
        id: uptime
        run: |
          START=$(date +%s%3N)
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ secrets.APP_URL }}/api/health" 2>/dev/null || echo "000")
          END=$(date +%s%3N)
          DURATION=$((END - START))
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "duration=${DURATION}ms" >> $GITHUB_OUTPUT

      - name: Fetch metrics
        run: |
          curl -s --max-time 15 \
            -H "x-monitor-secret: ${{ secrets.MONITOR_SECRET }}" \
            "${{ secrets.APP_URL }}/api/monitor/report" \
            -o /tmp/report.json
          echo "Response:"
          cat /tmp/report.json

      - name: Send daily report
        env:
          BOT_TOKEN: ${{ secrets.MONITOR_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.OWNER_CHAT_ID }}
          UPTIME_STATUS: ${{ steps.uptime.outputs.status }}
          UPTIME_DURATION: ${{ steps.uptime.outputs.duration }}
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, os

          with open('/tmp/report.json') as f:
            try:
              data = json.load(f)
              message = data.get('telegramMessage', '⚠️ Errore nel recupero metriche')
            except Exception as e:
              message = f'⚠️ Errore parsing: {e}'

          uptime_status = os.environ.get('UPTIME_STATUS', '000')
          uptime_duration = os.environ.get('UPTIME_DURATION', '?')
          if uptime_status == '200':
            uptime_line = f'  • Sito: ✅ online ({uptime_duration})'
          else:
            uptime_line = f'  • Sito: ❌ NON RAGGIUNGIBILE'

          message = message.replace('  • Database:', uptime_line + '\n  • Database:', 1)

          token = os.environ['BOT_TOKEN']
          chat_id = os.environ['CHAT_ID']
          payload = json.dumps({
            'chat_id': chat_id,
            'text': message,
            'parse_mode': 'HTML'
          }).encode('utf-8')

          req = urllib.request.Request(
            f'https://api.telegram.org/bot{token}/sendMessage',
            data=payload,
            headers={'Content-Type': 'application/json'}
          )
          resp = urllib.request.urlopen(req)
          print('Report sent:', resp.read().decode()[:100])
          PYEOF
